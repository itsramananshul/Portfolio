<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware deck demo · Thibaut-style nav</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0:#000;
  --green-glow:#4af04a;
  --green-deep:#0c2a0f;
  --rack:#0d0d0d;
  --rack-2:#1a1a1a;
  --rack-3:#252525;
  --groove:#040404;
  --metal-hi:rgba(255,255,255,.12);
  --metal-lo:rgba(0,0,0,.55);
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { background:#000; }
body {
  background:#000; color:#fff;
  font-family:'Inter',system-ui,sans-serif;
  min-height:100dvh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:40px 20px;
  position:relative; overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── ATMOSPHERIC GREEN GLOW BEHIND ── */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(800px 400px at 50% 20%, rgba(74,240,74,.10), transparent 60%),
    radial-gradient(1000px 600px at 50% 80%, rgba(74,240,74,.04), transparent 60%);
  animation:breathe 6s ease-in-out infinite;
}
@keyframes breathe { 50% { opacity:.65; } }
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.04; mix-blend-mode:overlay;
}

.title-mini {
  font-family:'Share Tech Mono', monospace;
  font-size:11px; letter-spacing:.32em; text-transform:uppercase;
  color:rgba(255,255,255,.4); margin-bottom:32px; z-index:2;
  display:flex; gap:14px; align-items:center;
}
.title-mini .dot { color:var(--green-glow); animation:blink 1s steps(2) infinite; }

/* ════════════════════════════════════════
   HARDWARE DECK
   ════════════════════════════════════════ */
.deck {
  position:relative; z-index:5;
  display:grid;
  grid-template-columns: auto 1fr auto;
  gap: 0;
  width:min(960px, 95vw);
  background:
    linear-gradient(180deg, #1c1c1c 0%, #0a0a0a 100%);
  border-radius:18px;
  padding:18px 22px 18px 22px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.10),
    inset 0 -2px 0 rgba(0,0,0,.6),
    0 6px 0 rgba(0,0,0,.55),
    0 30px 60px -10px rgba(0,0,0,.65),
    0 0 80px rgba(74,240,74,.08);
  border:1px solid rgba(255,255,255,.05);
  align-items:center;
  position:relative;
}
/* corner screws */
.deck::before, .deck::after,
.deck .scr-bl, .deck .scr-br {
  content:''; position:absolute; width:7px; height:7px; border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #888 0%, #2a2a2a 60%, #0a0a0a 100%);
  box-shadow:inset 0 1px 1px rgba(255,255,255,.18), 0 1px 2px rgba(0,0,0,.6);
}
.deck::before { top:8px; left:8px; }
.deck::after { top:8px; right:8px; }
.deck .scr-bl { bottom:8px; left:8px; }
.deck .scr-br { bottom:8px; right:8px; }

/* ── LEFT BLOCK (LCD + KEYS) ── */
.deck-left {
  display:flex; flex-direction:column; gap:10px;
  padding:6px 0;
}
.lcd {
  background:#0d1c10;
  border:1px solid rgba(74,240,74,.12);
  border-radius:6px;
  padding:7px 14px;
  width:280px;
  font-family:'Share Tech Mono', 'VT323', monospace;
  font-size:13px; letter-spacing:.05em;
  color:var(--green-glow);
  text-shadow:0 0 6px rgba(74,240,74,.6);
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:
    inset 0 0 14px rgba(0,0,0,.7),
    inset 0 1px 0 rgba(74,240,74,.08);
  position:relative; overflow:hidden;
}
/* CRT scanlines on LCD */
.lcd::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,.18) 2px 3px);
}
.lcd-text { position:relative; z-index:1; }
.lcd-cursor {
  width:8px; height:12px; background:var(--green-glow);
  display:inline-block; vertical-align:middle;
  box-shadow:0 0 6px var(--green-glow);
  animation:blink 1s steps(2) infinite;
  position:relative; z-index:1;
}
@keyframes blink { 50% { opacity:0; } }

/* ── KEYCAP GRID ── */
.keys {
  display:grid;
  grid-template-columns:repeat(4, 70px);
  grid-template-rows:repeat(3, 56px);
  gap:8px;
}

/* base keycap */
.kc {
  border-radius:8px;
  position:relative;
  cursor:pointer;
  font-family:'Inter', system-ui, sans-serif;
  font-weight:800;
  font-size:13px;
  letter-spacing:.04em;
  display:flex; align-items:center; justify-content:center;
  text-decoration:none;
  user-select:none;
  transition:transform .08s linear, box-shadow .08s linear, filter .15s;
  isolation:isolate;
}
.kc::before {
  /* top face inset highlight */
  content:''; position:absolute; inset:2px 2px 6px 2px;
  border-radius:6px;
  pointer-events:none;
  background:linear-gradient(180deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 30%, rgba(0,0,0,0) 70%, rgba(0,0,0,.18) 100%);
  z-index:1;
}
.kc::after {
  /* very thin top reflection sliver */
  content:''; position:absolute; left:6px; right:6px; top:3px; height:5px;
  border-radius:4px 4px 12px 12px;
  background:rgba(255,255,255,.16);
  filter:blur(2px); pointer-events:none; z-index:2;
}
.kc span { position:relative; z-index:3; }
.kc:active { transform:translateY(2px); }

/* PALETTE — using box-shadow stack to simulate 3D depth */
.kc-white {
  background:linear-gradient(180deg, #f5f0e0 0%, #d6cfb8 65%, #b8b09a 100%);
  color:#1a1a1a;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.6),
    inset 0 -2px 0 rgba(0,0,0,.18),
    0 4px 0 #6a6555,
    0 6px 8px rgba(0,0,0,.4);
}
.kc-cyan {
  background:linear-gradient(180deg, #c0e8f8 0%, #82b8d2 65%, #5a92aa 100%);
  color:#0a2030;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.5),
    inset 0 -2px 0 rgba(0,0,0,.18),
    0 4px 0 #344a58,
    0 6px 8px rgba(0,0,0,.4);
}
.kc-orange {
  background:linear-gradient(180deg, #f5a060 0%, #d8526b 50%, #a04a8a 100%);
  color:#fff;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.4),
    inset 0 -2px 0 rgba(0,0,0,.22),
    0 4px 0 #50284a,
    0 6px 8px rgba(0,0,0,.4);
}
.kc-cream {
  background:linear-gradient(180deg, #e0d2b0 0%, #b8a888 65%, #8c7e5e 100%);
  color:#3a2e18;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.45),
    inset 0 -2px 0 rgba(0,0,0,.18),
    0 4px 0 #4a3e25,
    0 6px 8px rgba(0,0,0,.4);
}
.kc-dark {
  background:linear-gradient(180deg, #2a2a2a 0%, #161616 65%, #060606 100%);
  color:#f0f0f0;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.10),
    inset 0 -2px 0 rgba(0,0,0,.50),
    0 4px 0 #000,
    0 6px 8px rgba(0,0,0,.4);
}
.kc-pink {
  background:linear-gradient(180deg, #f5a8c8 0%, #d878a0 60%, #a85878 100%);
  color:#3a0a1a;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.45),
    inset 0 -2px 0 rgba(0,0,0,.18),
    0 4px 0 #5a2840,
    0 6px 8px rgba(0,0,0,.4);
}
.kc-blue {
  background:linear-gradient(180deg, #5a78f0 0%, #2c4ad0 60%, #1a32a0 100%);
  color:#fff;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.40),
    inset 0 -2px 0 rgba(0,0,0,.20),
    0 4px 0 #0c1858,
    0 6px 8px rgba(0,0,0,.4);
}

/* size variants */
.kc-2u { grid-column: span 2; }

/* hover */
.kc:hover { filter:brightness(1.08) saturate(1.1); }

/* keycap legend layout */
.kc-2u span { letter-spacing:.06em; }

/* ── CENTER GRILLE ── */
.grille {
  height:88px;
  margin: 0 18px;
  border-radius:6px;
  background:
    repeating-linear-gradient(180deg,
      #060606 0 3px,
      #1a1a1a 3px 5px,
      #0a0a0a 5px 8px);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.05),
    inset 0 -1px 1px rgba(0,0,0,.6),
    inset 1px 0 1px rgba(0,0,0,.4),
    inset -1px 0 1px rgba(0,0,0,.4);
  position:relative;
}
.grille::before {
  /* subtle metallic sheen */
  content:''; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
  background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,.04) 50%, transparent 100%);
}

/* ── OSCILLOSCOPE / RADAR (right) ── */
.scope {
  width:138px; height:138px; border-radius:50%;
  background:
    radial-gradient(circle at 50% 45%, #144020 0%, #082010 65%, #020a04 100%);
  position:relative;
  box-shadow:
    inset 0 0 22px rgba(0,0,0,.85),
    inset 0 0 40px rgba(0,0,0,.5),
    0 0 0 2px #0a0a0a,
    0 0 0 4px #1a1a1a,
    0 0 0 5px rgba(255,255,255,.04),
    0 4px 12px rgba(0,0,0,.6);
  overflow:hidden;
}
/* CRT grid lines */
.scope::before {
  content:''; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
  background:
    /* horizontal lines */
    repeating-linear-gradient(0deg, transparent 0 11px, rgba(74,240,74,.08) 11px 12px),
    /* vertical lines */
    repeating-linear-gradient(90deg, transparent 0 11px, rgba(74,240,74,.08) 11px 12px);
  mask:radial-gradient(circle at 50% 50%, black 60%, transparent 80%);
}
/* CRT scanline sweep */
.scope::after {
  content:''; position:absolute; left:0; right:0;
  height:2px; background:rgba(74,240,74,.18);
  filter:blur(1.5px);
  animation:sweep 4s linear infinite;
}
@keyframes sweep { 0%{top:-4px;opacity:0} 5%{opacity:1} 95%{opacity:.5} 100%{top:138px;opacity:0} }

/* the AR initials (vector-style) */
.scope-mark {
  position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  font-family:'VT323', monospace;
  font-size:80px; font-weight:400; line-height:1;
  color:var(--green-glow);
  text-shadow:
    0 0 4px rgba(74,240,74,.9),
    0 0 12px rgba(74,240,74,.55),
    0 0 24px rgba(74,240,74,.35);
  letter-spacing:-.05em;
  z-index:1; user-select:none;
}
.scope-mark .l1 { display:inline-block; }
.scope-mark .l2 { display:inline-block; margin-left:-8px; }

/* corner screws ON the scope bezel */
.scope-screws {
  position:absolute; pointer-events:none;
  width:178px; height:178px; left:50%; top:50%; transform:translate(-50%,-50%);
}
.scope-screw {
  position:absolute; width:7px; height:7px; border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #888 0%, #2a2a2a 60%, #0a0a0a 100%);
  box-shadow:inset 0 1px 1px rgba(255,255,255,.18), 0 1px 2px rgba(0,0,0,.6);
}
.scope-screw.tl { top:6px; left:6px; }
.scope-screw.tr { top:6px; right:6px; }
.scope-screw.bl { bottom:6px; left:6px; }
.scope-screw.br { bottom:6px; right:6px; }

/* the right block wraps scope so we can position screws relative */
.deck-right {
  position:relative;
  display:grid; place-items:center;
  padding:0 4px;
}

/* caption below */
.caption {
  margin-top:36px; max-width:680px; text-align:center;
  font-family:'Share Tech Mono', monospace;
  font-size:12px; letter-spacing:.16em; text-transform:uppercase;
  color:rgba(255,255,255,.5); line-height:1.8;
  z-index:2;
}
.caption .gr { color:var(--green-glow); }

/* RESPONSIVE */
@media (max-width: 760px) {
  .deck { grid-template-columns:1fr; gap:14px; padding:18px; }
  .deck-left { width:100%; }
  .lcd { width:100%; }
  .grille { display:none; }
  .deck-right { padding-top:8px; }
  .scope { width:120px; height:120px; }
  .scope-screws { width:160px; height:160px; }
  .keys { grid-template-columns:repeat(4, 1fr); }
}
</style>
</head>
<body>

<div class="title-mini">
  <span class="dot">●</span>
  <span>Hardware deck · concept demo</span>
  <span style="opacity:.4">— inspired by thibaut.cool</span>
</div>

<!-- ════════════════════════════════════════
     HARDWARE DECK
     ════════════════════════════════════════ -->
<div class="deck">
  <span class="scr-bl"></span>
  <span class="scr-br"></span>

  <!-- LEFT: LCD + keys -->
  <div class="deck-left">
    <div class="lcd">
      <span class="lcd-text" id="lcdText">AVAILABLE FOR CO-OP · FALL 2026</span>
      <span class="lcd-cursor"></span>
    </div>

    <div class="keys">
      <!-- Row 1 -->
      <a class="kc kc-white"  href="#hero"><span>HOME</span></a>
      <a class="kc kc-cyan"   href="https://github.com/itsramananshul" target="_blank"><span>GH</span></a>
      <a class="kc kc-orange" href="https://www.linkedin.com/in/anshulraman06" target="_blank"><span>LI</span></a>
      <span></span>

      <!-- Row 2 -->
      <a class="kc kc-cream"  href="mailto:ar.dev@anshulraman.com"><span>@</span></a>
      <a class="kc kc-dark kc-2u" href="mailto:ar.dev@anshulraman.com"><span>HIRE ME</span></a>
      <a class="kc kc-dark"   href="https://x.com/" target="_blank"><span>X</span></a>

      <!-- Row 3 -->
      <a class="kc kc-cream kc-2u" href="tel:+1"><span>CALL ME</span></a>
      <a class="kc kc-pink"   href="resume.pdf" target="_blank"><span>CV</span></a>
      <a class="kc kc-blue"   href="#projects"><span>WK</span></a>
    </div>
  </div>

  <!-- CENTER: speaker grille -->
  <div class="grille"></div>

  <!-- RIGHT: oscilloscope -->
  <div class="deck-right">
    <div class="scope-screws">
      <span class="scope-screw tl"></span>
      <span class="scope-screw tr"></span>
      <span class="scope-screw bl"></span>
      <span class="scope-screw br"></span>
    </div>
    <div class="scope">
      <div class="scope-mark"><span class="l1">A</span><span class="l2">R</span></div>
    </div>
  </div>
</div>

<div class="caption">
  Hover the keys · click <span class="gr">HIRE ME</span> to email · this is a concept piece — once you give the OK,<br>
  it gets dropped into the hero of your portfolio as the navigation deck.
</div>

<script>
// LCD text rotates through different statuses
const lcdEl = document.getElementById('lcdText');
const lines = [
  'AVAILABLE FOR CO-OP · FALL 2026',
  'BUILDING ARIA · 365 DAYS LIVE',
  'FOUNDING ENGINEER @ OPENPREM',
  'SOPHOMORE · UC · CINCINNATI',
  '13+ PROJECTS SHIPPED · 3.68 GPA',
];
let i = 0;
function rotate() {
  lcdEl.style.opacity = '0';
  setTimeout(() => {
    i = (i + 1) % lines.length;
    lcdEl.textContent = lines[i];
    lcdEl.style.opacity = '1';
  }, 220);
}
lcdEl.style.transition = 'opacity .22s';
setInterval(rotate, 3500);
</script>
</body>
</html>
